# ===================================================================
# gripper.yaml
# ===================================================================


# ═══════════════════════════════════════════════════════════════════
# 1. GRIP MODE
# ═══════════════════════════════════════════════════════════════════

grip_mode: "outwards"  # "Outwards" or "Inwards"


# ═══════════════════════════════════════════════════════════════════
# 2. 2FG7 GEOMETRY
# ═══════════════════════════════════════════════════════════════════
#
# Outwards-facing grip:
#  - Fingers configured with the L short shape in the center
#  - External grip range: 35–73 mm
#  - Internal grip range: 45–83 mm
#
# Inwards-facing grip:
#  - Fingers configured with the L short shape flipped to the outside
#  - External grip range: 1–39 mm
#  - Internal grip range: 11–49 mm  

outwards:
  flange_to_finger_base:       0.1225
  flange_to_fingertips:        0.1625
  gripper_flange_to_fingertip: 0.1425
  finger_grasp_height:         0.0400
  grip_range_min:              0.035
  grip_range_max:              0.073

inwards:
  flange_to_finger_base:       0.1175
  flange_to_fingertips:        0.1625
  gripper_flange_to_fingertip: 0.1400
  finger_grasp_height:         0.0450
  grip_range_min:              0.045
  grip_range_max:              0.083


# ═══════════════════════════════════════════════════════════════════
# 3. GRASP HEIGHT TUNING
# ═══════════════════════════════════════════════════════════════════

grasp_z_offset:          0.0015
finger_grasp_top_margin: 0.005


# ═══════════════════════════════════════════════════════════════════
# 4. GRIPPER MOVEMENT
# ═══════════════════════════════════════════════════════════════════

gripper_solver_position_iterations: 32
gripper_solver_velocity_iterations: 8
gripper_move_duration: 1.5
gripper_move_steps:    60


# ═══════════════════════════════════════════════════════════════════
# 5. JOINT CONTROL
#
#   Phase 1 — APPROACH (velocity-controlled)
#     K ≈ 0 — no position snapping
#     D controls speed: higher D = slower
#     target_velocity drives the fingers
#
#   Phase 2 — SQUEEZE (medium stiffness)
#     Builds real lateral pressure on object sides
#     Settles for squeeze_ticks frames
#
#   HOLDING (force-controlled position)
#     Targets slightly BEHIND contact to maintain pressure
#     High K + D for firm grip without oscillation
#
#   OPEN (fast retraction)
#     Position-controlled, firm spring
# ═══════════════════════════════════════════════════════════════════

# ── Phase 1: velocity-controlled approach ──────────────────────────
gripper_approach_stiffness:  100.0      # N/m  — low stiffness for velocity control
gripper_approach_damping:    800.0      # N·s/m — high damping for controlled approach
gripper_approach_speed:      0.080      # m/s  — target finger closing speed

# ── Phase 2: squeeze ──────────────────────────────────────────────
# Rule: K_squeeze < (max_force / max_penetration_depth)
gripper_squeeze_stiffness:  2000.0      # N/m   — medium stiffness to build grip force
gripper_squeeze_damping:    500.0       # N·s/m — moderate damping to settle without oscillation
gripper_squeeze_ticks:         50       # frames to hold squeeze position before switching to hold

# ── Holding: pure force control ─────────────────────────────
# High K + target_inside_object = explosion
# Low K + correct target = stable squeeze
gripper_hold_stiffness:   5000.0     # N/m    — high stiffness to maintain position against disturbances
gripper_hold_damping:        200.0     # N·s/m  — moderate damping to prevent oscillation
gripper_hold_tolerance:     0.0005      # m     — how far inside the object the target can be for stable hold
gripper_hold_force_ratio:   1.0         # full force during hold

# ── Open: fast retraction ──────────────────────────────────────────
gripper_open_stiffness:  400000.0       # N/m
gripper_open_damping:       800.0       # N·s/m


# ═══════════════════════════════════════════════════════════════════
# 6. FORCE BOUNDS
# ═══════════════════════════════════════════════════════════════════

gripper_default_force:  80.0     # N — fallback
min_grip_force:         20.0     # N — 2FG7 min
max_grip_force:        140.0     # N — 2FG7 max

# ── Physics calculation ────────────────────────────────────────────
grip_safety_factor:      2.0
robot_max_accel_ms2:     5.0
gravity_ms2:             9.81


# ═══════════════════════════════════════════════════════════════════
# 7. STALL DETECTION + OBJECT DETECTION
# ═══════════════════════════════════════════════════════════════════

# ── Stall (from working controller) ───────────────────────────────
gripper_stall_threshold:    0.0005    # m/tick — larger than before (velocity control moves more per tick)
gripper_stall_ticks:        5         # fewer ticks needed (velocity stall is clearer)
gripper_min_closing_ticks:  10        # shorter warmup (velocity starts immediately)

# ── Object detection ──────────────────────────────────────────────
gripper_object_detect_threshold: 0.003


# ═══════════════════════════════════════════════════════════════════
# 8. FINGER FRICTION
# ═══════════════════════════════════════════════════════════════════

gripper_friction:
  static_friction:  3.5
  dynamic_friction: 3.0
  restitution:      0.0


# ═══════════════════════════════════════════════════════════════════
# 9. DEBUG
# ═══════════════════════════════════════════════════════════════════

gripper_verbose: true