# ===================================================================
# robot.yaml
# ===================================================================


# ═══════════════════════════════════════════════════════════════════
# 1. UR5E IDENTITY
# ═══════════════════════════════════════════════════════════════════

ur5e_base_height: 0.8593   # metres — fallback if base_link prim not found

# ═══════════════════════════════════════════════════════════════════
# 3. ARM MOVEMENT
# ═══════════════════════════════════════════════════════════════════

arm_home_deg:      [0.0, -90.0, 30.0, -90.0, -90.0, 0.0] # [90.0, -90.0, 0.0, -90.0, 0.0, 0.0]

# ═══════════════════════════════════════════════════════════════════
# 7. DEBUG LOGGING
# ═══════════════════════════════════════════════════════════════════

arm_verbose:      false   # detailed IK + joint logging
